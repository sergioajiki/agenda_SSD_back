# ==========================================================
# Informacoes da aplicacao
# ==========================================================
spring.application.name=agenda_SSD_back
spring.application.version=1.0.0

# Perfil ativo quando nenhum for especificado (ex.: rodando localmente com
# ./mvnw spring-boot:run sem nenhum argumento extra) — cai em application-dev.properties.
# Producao deve sobrescrever explicitamente com SPRING_PROFILES_ACTIVE=prod,
# nunca depender desse default.
spring.profiles.default=dev


# ==========================================================
# Banco de Dados H2 (MODO PERSISTENTE EM ARQUIVO)
# ==========================================================
# Cria o banco fisicamente em ./data/agendadb.mv.db.
# Esse banco sera preservado apos o encerramento da aplicacao.
# Mesmo caminho em dev e prod por enquanto — se producao rodar de um
# diretorio de trabalho diferente (ex.: container), isso precisa virar um
# caminho absoluto configuravel por variavel de ambiente.
spring.datasource.url=jdbc:h2:file:./data/agendadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=LEGACY

# Driver do H2
spring.datasource.driver-class-name=org.h2.Driver

# Usuario e senha padrao do H2
spring.datasource.username=sa
spring.datasource.password=


# ==========================================================
# JPA / Hibernate
# ==========================================================
# update:
# - Cria as tabelas se nao existirem
# - Mantem dados existentes
# - NAO apaga nada
# (Sem ferramenta de migracao tipo Flyway/Liquibase ainda — pra um prod de
# verdade, "update" automatico nao e o ideal, mas e o que o projeto tem hoje.)
spring.jpa.hibernate.ddl-auto=update

# Dialeto correto para H2 + Hibernate 6
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Remove warnings relacionados a criacao de LOBs
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# ==========================================================
# Execucao de schema.sql e data.sql
# ==========================================================
# Faz o Spring rodar os arquivos SQL SOMENTE depois das tabelas existirem.
# Sem isso, o data.sql falha quando o Hibernate ainda nao criou as tabelas.
spring.jpa.defer-datasource-initialization=true


# ==========================================================
# JWT (autenticacao)
# ==========================================================
# Tempo de expiracao do token, em milissegundos (15 minutos). Janela curta de
# proposito: mitiga um token antigo continuar valido depois de uma troca de
# senha (JWT nao tem revogacao/blocklist). Sem refresh token, isso significa
# relogar a cada 15min de uso — se isso incomodar no dia a dia (ex.: admin
# lendo logs por muito tempo sem interagir), o proximo passo natural e'
# implementar refresh token em vez de so aumentar esse valor de novo.
# (E' o mesmo valor em qualquer ambiente — nao e' uma questao de dev vs prod.)
jwt.expiration-ms=900000
