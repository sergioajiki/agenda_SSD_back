# ==========================================================
# Perfil DEV — conveniencias de desenvolvimento local
# Ativo por padrao (ver spring.profiles.default em application.properties)
# ==========================================================

# ----------------------------------------------------------
# Console Web H2 (http://localhost:8080/h2-console)
# ----------------------------------------------------------
# Sem Spring Security cobrindo o console em si (so o SecurityConfig libera
# a rota), isso equivale a acesso irrestrito ao banco — aceitavel em dev
# local, nunca em producao (ver application-prod.properties).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ----------------------------------------------------------
# Logging detalhado de SQL
# ----------------------------------------------------------
# TRACE nos bind params grava o valor literal de todo parametro no log,
# incluindo email e hash de senha — util pra depurar em dev, mas nunca
# deveria ir pra producao.
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ----------------------------------------------------------
# JWT
# ----------------------------------------------------------
# Segredo com fallback fixo — serve so pra dev local. Em producao esse
# fallback nao existe (application-prod.properties exige a variavel de
# ambiente de verdade, a aplicacao nem sobe sem ela).
jwt.secret=${JWT_SECRET:5f3e8a1c9b7d2f6e4a0c8b3d7f1e9a5c2b6d0f4e8a3c7b1d9f5e0a4c8b2d6f7e}

# ----------------------------------------------------------
# CORS
# ----------------------------------------------------------
# Origens de dev: localhost (front local) e o IP da rede usado quando
# alguem testa a partir de outra maquina na mesma rede.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://10.26.57.174:3000}
