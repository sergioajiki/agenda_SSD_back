# ==========================================================
# ? Informa��es da aplica��o
# ==========================================================
spring.application.name=agenda_SSD_back
spring.application.version=1.0.0


# ==========================================================
# ? Banco de Dados H2 (MODO PERSISTENTE EM ARQUIVO)
# ==========================================================
# Cria o banco fisicamente em ./data/agendadb.mv.db.
# Esse banco ser� preservado ap�s o encerramento da aplica��o.
spring.datasource.url=jdbc:h2:file:./data/agendadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=LEGACY

# Driver do H2
spring.datasource.driver-class-name=org.h2.Driver

# Usu�rio e senha padr�o do H2
spring.datasource.username=sa
spring.datasource.password=


# ==========================================================
# ? Console Web H2 (interface gr�fica)
# ==========================================================
# Ativa console web do H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Caminho do console
spring.h2.console.path=/h2-console

# Permite abrir arquivos locais no console H2
spring.h2.console.settings.web-allow-others=true


# ==========================================================
# ? JPA / Hibernate
# ==========================================================
# update:
# - Cria as tabelas se n�o existirem
# - Mant�m dados existentes
# - N�O apaga nada
spring.jpa.hibernate.ddl-auto=update

# Exibir SQL no console
spring.jpa.show-sql=true

# Dialeto correto para H2 + Hibernate 6
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Remove warnings relacionados � cria��o de LOBs
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# ==========================================================
# ? Execu��o de schema.sql e data.sql
# ==========================================================
# Garante que o Spring verifique e execute arquivos SQL do resources
# Somente s�o executados se o banco estiver vazio.

# spring.sql.init.mode=always

# Faz o Spring rodar os arquivos SQL SOMENTE depois das tabelas existirem.
# Sem isso, o data.sql falha quando o Hibernate ainda n�o criou as tabelas.
spring.jpa.defer-datasource-initialization=true


# ==========================================================
# ? Logging detalhado (opcional)
# ==========================================================
# Mostra todas as consultas SQL
logging.level.org.hibernate.SQL=DEBUG

# Mostra os par�metros das consultas
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ==========================================================
# JWT (autenticacao)
# ==========================================================
# Segredo usado para assinar o token (HMAC-SHA256, exige pelo menos 32 bytes).
# O valor abaixo eh so para desenvolvimento local. Em producao, sobrescrever
# via variavel de ambiente JWT_SECRET com um segredo forte que nunca seja
# commitado no repositorio.
jwt.secret=${JWT_SECRET:5f3e8a1c9b7d2f6e4a0c8b3d7f1e9a5c2b6d0f4e8a3c7b1d9f5e0a4c8b2d6f7e}

# Tempo de expiracao do token, em milissegundos (15 minutos). Janela curta de
# proposito: mitiga um token antigo continuar valido depois de uma troca de
# senha (JWT nao tem revogacao/blocklist). Sem refresh token, isso significa
# relogar a cada 15min de uso — se isso incomodar no dia a dia (ex.: admin
# lendo logs por muito tempo sem interagir), o proximo passo natural e'
# implementar refresh token em vez de so aumentar esse valor de novo.
jwt.expiration-ms=900000


# ==========================================================
# CORS
# ==========================================================
# Origens permitidas a chamar a API, separadas por virgula. Sobrescrever via
# variavel de ambiente CORS_ALLOWED_ORIGINS quando o front for publicado em
# outro endereco (ex.: o dominio/IP de producao), sem precisar mexer no codigo.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://10.26.57.174:3000}
