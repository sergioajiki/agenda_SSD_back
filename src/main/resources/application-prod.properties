# ==========================================================
# Perfil PROD — endurece o que o dev relaxa
# Ativar com SPRING_PROFILES_ACTIVE=prod (nunca fica ativo por acidente,
# ver spring.profiles.default=dev em application.properties)
# ==========================================================

# ----------------------------------------------------------
# Console Web H2
# ----------------------------------------------------------
# Fechado — acesso direto ao banco nao deve existir em producao.
spring.h2.console.enabled=false

# ----------------------------------------------------------
# Logging de SQL
# ----------------------------------------------------------
# Sem log verboso nem bind params em producao (o TRACE de dev grava dado
# sensivel — email, hash de senha — no log da aplicacao).
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ----------------------------------------------------------
# JWT
# ----------------------------------------------------------
# Sem valor padrao: se JWT_SECRET nao estiver definido no ambiente, a
# aplicacao falha ao subir (erro de placeholder nao resolvido) em vez de
# rodar silenciosamente com o segredo de dev que esta no repositorio.
jwt.secret=${JWT_SECRET}

# ----------------------------------------------------------
# CORS
# ----------------------------------------------------------
# Mesma logica: sem fallback. Definir explicitamente a(s) origem(ns) real(is)
# do front em producao via variavel de ambiente.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
